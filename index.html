<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GTSOFIA</title>

  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-logo">GTSOFIA</div>

  <nav class="nav-links">
    <button onclick="showPage('home')" class="nav-btn active">Начало</button>
    <button onclick="showPage('transport')" class="nav-btn">Транспорт</button>
    <button onclick="showPage('fleet')" class="nav-btn">Подвижен състав</button>
    <button onclick="showPage('contacts')" class="nav-btn">Контакти</button>
  </nav>
</header>

<!-- PAGES -->
<main>

  <!-- HOME -->
  <section id="home-page" class="page">
    <div class="page-center">
      <h1>Добре дошли в GTSOFIA</h1>
      <p>Система за информация за градски транспорт в София.</p>
    </div>
  </section>

  <!-- TRANSPORT (ТВОЯТ СЕГАШЕН UI) -->
  <section id="transport-page" class="page">
    <div class="app">

      <aside class="sidebar">
        <input class="search" id="searchInput" placeholder="Търсене по линия…" />

        <div class="filters">
          <button class="filter-btn active" onclick="setFilter(null, this)">Всички</button>
          <button class="filter-btn" onclick="setFilter('bus', this)">Автобуси</button>
          <button class="filter-btn" onclick="setFilter('night', this)">Нощни</button>
          <button class="filter-btn" onclick="setFilter('tram', this)">Трамваи</button>
          <button class="filter-btn" onclick="setFilter('trolley', this)">Тролейбуси</button>
          <button class="filter-btn" onclick="setFilter('metro', this)">Метро</button>
        </div>

        <h3 class="section-title">Линии</h3>
        <div class="lines-grid" id="linesGrid"></div>
      </aside>

      <main class="content">
        <div id="contentArea"></div>
      </main>

    </div>
  </section>

  <!-- FLEET -->
  <section id="fleet-page" class="page">
    <div id="fleetContainer" class="fleet-grid"></div>
  </section>

  <!-- CONTACTS -->
  <section id="contacts-page" class="page">
    <div class="page-center">
      <h2>Контакти</h2>
      <p>Email: contact@example.com</p>
      <p>GitHub: https://github.com/ngb1639/gtsofia</p>
    </div>
  </section>

</main>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
